<!doctype html>
<html>

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18181b">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
      rel='stylesheet'>
    <title>Bible App</title>
  </head>

  <body class="min-h-screen flex gap-5 flex-col bg-zinc-900 overflow-hidden">
    <header id="header" class="z-20">

      <div id="bibleHeader"
        class="hidden flex items-center justify-between w-full h-15 bg-zinc-900/50 backdrop-blur z-20">

        <div class="flex ml-5 gap-4 bg-zinc-700 rounded-full text-white  h-10">
          <button id="chapterSelect"
            class="w-25 ml-5 bg-zinc-700 rounded-full outline-none  transition-all hover:bg-white/30 "
            >
        </button>

          <div class="border-l-3 border-zinc-700 rounded-full "></div>
          <select id="versionSelect"
            class="bg-zinc-700 rounded-full outline-none px-5 transition-all">
            <option value="78a9f6124f344018-01">NIV</option>
            <option value="d6e14a625393b4da-01">NLT</option>
          </select>
        </div>

        <button onclick="openSettings()">
          <i
            class="bx bx-cog animate-spin text-white text-2xl  rounded-full p-1 mr-5 cursor-pointer transition-all hover:bg-white/30"></i>
        </button>
      </div>

      <div id="youHeader"
        class="hidden flex items-center justify-between w-full h-15 bg-zinc-900/50 backdrop-blur z-20">

      </div>
      <div id="plansHeader"
        class="hidden flex items-center justify-between w-full h-15 bg-zinc-900/50 backdrop-blur z-20"></div>
      <div id="discoverHeader"
        class="hidden flex items-center justify-between w-full h-15 bg-zinc-900/50 backdrop-blur z-20">
      </div>
      <div id="homeHeader"
        class="hidden flex items-center justify-between w-full h-15 bg-zinc-900/50 backdrop-blur z-20">
        <h1
          class="border-b-2  border-red-300 rounded-sm py-1 ml-5 mt-5 text-2xl ">Today</h1>

      </div>

    </header>

    <div class="overlay fixed inset-0 z-0"></div>
    <main id="content"
      class="flex-1 overflow-y-hidden items-center  flex justify-center ml-5 mr-5">
      <div id="bibleContent"
        class="section flex flex-1 flex-col gap-10 items-center justify-center h-140 md:max-h-150 lg:max-h-155 2xl:max-h-200 max-w-300 rounded-lg z-6  ">
        <div id="bookDisplay"
          class="z-10  hide-scrollbar text-white overflow-x-hidden overflow-y-scroll ">

        </div>
        <div>
          <i class="bx bx-caret-left text-white/50 text-5xl hover:text-white transition-all cursor-pointer" onclick="previousChapter()"></i> 
                  <i class="bx bx-caret-right text-white/50 text-5xl hover:text-white transition-all cursor-pointer" onclick="nextChapter ()"></i> </div>

        </div>
      </div>

      <!-- HOME CONTENT-->
      <div id="homeContent"
        class="section min-h-screen w-full  ml-5 mr-5 text-white flex flex-col gap-5 relative">

        <h1 id="greeting" class="text-2xl z-10">Good Afternoon, User</h1>
        <aside class="h-50 w-full text-white z-10 relative">
          <h1 class="text-xl">Verse of The Day</h1>
          <p></p>
        </aside>

      </div>

    </main>

    <!---SEMI-COMPLETED: ADD SELECTED EVENTS-->
    <footer
      class="flex justify-evenly items-center w-full rounded-full h-25 mb-5 bg-zinc-900/50 backdrop-blur z-20"
      id="footer">

      <div
        class="transition-all cursor-pointer md:hover:bg-white/30 rounded-lg flex flex-col justify-center items-center text-white "
        id="footerHome" data-name="Home">
        <i class="bx bx-home text-md lg:text-xl"></i>
        <h1>Home</h1>
      </div>
      <div
        class="transition-all cursor-pointer md:hover:bg-white/30 rounded-lg  flex flex-col justify-center items-center text-zinc-500 "
        id="footerBible" data-name="Bible">
        <i class="bx bx-bible text-md lg:text-xl"></i>
        <h1>Bible</h1>
      </div>
      <div
        class="transition-all cursor-pointer md:hover:bg-white/30 rounded-lg flex flex-col justify-center items-center text-zinc-500 "
        id="footerPlans" data-name="Plans">
        <i class="bx bx-check text-md lg:text-xl"></i>
        <h1>Plans</h1>
      </div>
      <div
        class="transition-all cursor-pointer md:hover:bg-white/30 rounded-lg  flex flex-col justify-center items-center text-zinc-500 "
        id="footerDiscover" data-name="Discover">
        <i class="bx bx-search text-md lg:text-xl"></i>
        <h1>Discover</h1>
      </div>

      <!-- TODO: CODE IN ACCURATE PROFILE PICTURE -->
      <div
        class="transition-all cursor-pointer md:hover:bg-white/30 rounded-lg flex flex-col justify-center items-center text-zinc-500 "
        id="footerYou" data-name="You">
        <i class="bx bx-user text-md"></i>
        <h1>You</h1>
      </div>

    </footer>

    <script src="index.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('SW registered'))
        .catch(err => console.log(err));
    }

  </script>

  </body>

</html>
